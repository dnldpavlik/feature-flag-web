<section class="audit-page">
  <app-page-header
    title="Audit Log"
    description="Track all changes to flags, environments, projects, and segments."
  />

  <div class="audit-toolbar">
    <div class="audit-toolbar__filters">
      <app-labeled-select
        label="Action"
        [options]="actionOptions"
        [value]="actionFilter()"
        (valueChange)="onActionChange($event)"
      />
      <app-labeled-select
        label="Resource"
        [options]="resourceOptions"
        [value]="resourceFilter()"
        (valueChange)="onResourceChange($event)"
      />
    </div>
    <div class="audit-toolbar__meta">
      <span class="audit-count text-muted">
        {{ filteredCount() }} of {{ totalCount() }} entries
      </span>
    </div>
  </div>

  @if (filteredEntries().length === 0) {
    <app-empty-state
      title="No audit entries found"
      message="Try adjusting your filters or search query."
    >
    </app-empty-state>
  } @else {
    <app-ui-data-table [items]="filteredEntries()" ariaLabel="Audit log" emptyText="No audit entries match.">
      <ng-template appUiCol="timestamp" header="Timestamp" width="20%" let-entry>
        <span class="audit-cell audit-cell--timestamp text-muted">{{ entry.timestamp | date: 'medium' }}</span>
      </ng-template>
      <ng-template appUiCol="action" header="Action" width="12%" let-entry>
        <span class="badge badge--{{ entry.action }}">{{ formatAction(entry.action) }}</span>
      </ng-template>
      <ng-template appUiCol="resource" header="Resource" width="24%" let-entry>
        <div class="audit-cell audit-cell--resource">
          <span class="badge badge--info">{{ formatResourceType(entry.resourceType) }}</span>
          <span class="audit-cell__name">{{ entry.resourceName }}</span>
        </div>
      </ng-template>
      <ng-template appUiCol="userName" header="User" width="15%" let-entry>
        <span>{{ entry.userName }}</span>
      </ng-template>
      <ng-template appUiCol="details" header="Details" width="29%" [sortable]="false" let-entry>
        <span class="audit-cell audit-cell--details text-secondary">{{ entry.details }}</span>
      </ng-template>
    </app-ui-data-table>
  }
</section>
