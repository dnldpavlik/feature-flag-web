<div class="settings-page">
  <ui-page-header title="Settings" />

  <ui-tabs [tabs]="tabs" [activeTabId]="activeTab()" (tabChange)="onTabChange($event)" />

  <main class="settings-page__content">
    @switch (activeTab()) {
      @case ('profile') {
        <app-user-profile-tab />
      }
      @case ('preferences') {
        <app-preferences-tab />
      }
      @case ('api-keys') {
        <app-api-keys-tab />
      }
      @case ('theme') {
        <app-theme-tab />
      }
    }
  </main>
</div>
