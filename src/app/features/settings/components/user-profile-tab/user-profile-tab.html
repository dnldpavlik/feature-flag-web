<div class="user-profile-tab">
  <section class="user-profile-tab__section">
    <h3 class="user-profile-tab__section-title">Profile Information</h3>

    <div class="user-profile-tab__profile-content">
      <div class="user-profile-tab__avatar">
        @if (userProfile().avatarUrl) {
          <img
            [src]="userProfile().avatarUrl"
            [alt]="userProfile().name"
            class="user-profile-tab__avatar-image"
          />
        } @else {
          <span class="user-profile-tab__avatar-initials">{{ initials() }}</span>
        }
      </div>

      <div class="user-profile-tab__form">
        <div class="user-profile-tab__field">
          <label class="user-profile-tab__label" for="profile-name">Name</label>
          <input
            type="text"
            id="profile-name"
            class="user-profile-tab__input"
            [value]="profileName()"
            (input)="onNameInput($event)"
          />
        </div>

        <div class="user-profile-tab__field">
          <label class="user-profile-tab__label" for="profile-email">Email</label>
          <input
            type="email"
            id="profile-email"
            class="user-profile-tab__input"
            [value]="profileEmail()"
            (input)="onEmailInput($event)"
          />
        </div>

        <ui-button class="user-profile-tab__save-btn" (click)="saveProfile()">
          Save Profile
        </ui-button>
      </div>
    </div>
  </section>

  <section class="user-profile-tab__section">
    <h3 class="user-profile-tab__section-title">Change Password</h3>
    <p class="user-profile-tab__section-description">
      Update your password to keep your account secure.
    </p>

    <div class="user-profile-tab__password-form">
      <div class="user-profile-tab__field">
        <label class="user-profile-tab__label" for="current-password"> Current Password </label>
        <input
          type="password"
          id="current-password"
          class="user-profile-tab__input"
          [value]="currentPassword()"
          (input)="onCurrentPasswordInput($event)"
        />
      </div>

      <div class="user-profile-tab__field">
        <label class="user-profile-tab__label" for="new-password"> New Password </label>
        <input
          type="password"
          id="new-password"
          class="user-profile-tab__input"
          [value]="newPassword()"
          (input)="onNewPasswordInput($event)"
        />
      </div>

      <div class="user-profile-tab__field">
        <label class="user-profile-tab__label" for="confirm-password"> Confirm New Password </label>
        <input
          type="password"
          id="confirm-password"
          class="user-profile-tab__input"
          [value]="confirmPassword()"
          (input)="onConfirmPasswordInput($event)"
        />
        @if (showPasswordError()) {
          <span class="user-profile-tab__password-error"> Passwords do not match </span>
        }
      </div>

      <ui-button
        class="user-profile-tab__password-btn"
        [disabled]="!canChangePassword()"
        (click)="changePassword()"
      >
        Change Password
      </ui-button>
    </div>
  </section>
</div>
