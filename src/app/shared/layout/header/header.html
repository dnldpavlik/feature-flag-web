<header class="header">
  <div class="header__left">
    <app-button
      variant="ghost"
      icon="menu"
      class="header__menu-btn"
      (click)="menuToggle.emit()"
    ></app-button>
    <app-breadcrumb [items]="breadcrumbs()" (selectionChange)="handleBreadcrumbSelection($event)" />
  </div>

  <div class="header__right">
    <app-search-input
      class="header__search"
      placeholder="Search..."
      shortcutHint="/"
      [value]="searchValue()"
      (valueChange)="updateSearch($event)"
      (searchSubmit)="updateSearch($event)"
    />
    <app-button variant="primary" icon="plus" (click)="createFlag()">Create Flag</app-button>
  </div>
</header>
