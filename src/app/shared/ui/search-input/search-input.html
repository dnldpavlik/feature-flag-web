<div [class]="containerClasses()">
  <app-icon name="search" [size]="16" class="search-input__icon" />
  <input
    #inputElement
    type="text"
    class="search-input__field"
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="disabled()"
    [attr.aria-label]="ariaLabel()"
    (input)="onInput($event)"
    (keydown)="onKeydown($event)"
  />
  @if (shortcutHint()) {
    <kbd class="search-input__shortcut">{{ shortcutHint() }}</kbd>
  }
</div>
