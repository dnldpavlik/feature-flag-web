<label class="form-field__label" [attr.for]="inputId()">
  {{ label() }}
</label>

@if (type() === 'textarea') {
  <textarea
    class="form-field__input"
    [class.form-field__input--error]="error()"
    [id]="inputId()"
    [placeholder]="placeholder()"
    [disabled]="isDisabled()"
    [rows]="rows()"
    [attr.aria-describedby]="ariaDescribedBy()"
    [attr.aria-invalid]="error() ? 'true' : null"
    [attr.aria-required]="required() ? 'true' : null"
    [attr.required]="required() ? '' : null"
    [value]="value()"
    (input)="onInput($event)"
    (blur)="onTouched()"
  ></textarea>
} @else {
  <input
    class="form-field__input"
    [class.form-field__input--error]="error()"
    [type]="type()"
    [id]="inputId()"
    [placeholder]="placeholder()"
    [disabled]="isDisabled()"
    [attr.aria-describedby]="ariaDescribedBy()"
    [attr.aria-invalid]="error() ? 'true' : null"
    [attr.aria-required]="required() ? 'true' : null"
    [attr.required]="required() ? '' : null"
    [value]="value()"
    (input)="onInput($event)"
    (blur)="onTouched()"
  />
}

@if (hint()) {
  <span class="form-field__hint" [id]="inputId() + '-hint'">
    {{ hint() }}
  </span>
}

@if (error()) {
  <span class="form-field__error" [id]="inputId() + '-error'">
    {{ error() }}
  </span>
}
