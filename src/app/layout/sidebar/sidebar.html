<aside class="sidebar">
  <div class="sidebar__header">
    <div class="sidebar__logo">
      <app-logo-icon />
      <span class="sidebar__title">Feature Flags</span>
    </div>
  </div>

  <nav class="sidebar__nav">
    <ul class="nav-list">
      @for (item of navItems(); track item.label) {
        <ui-nav-item [label]="item.label" [route]="item.route" [icon]="item.icon" />
      }
    </ul>

    <ui-nav-section title="Environments">
      <ul class="nav-list">
        @for (env of environments(); track env.name) {
          <ui-nav-item [label]="env.name" [route]="env.route" [indicatorColor]="env.color" />
        }
      </ul>
    </ui-nav-section>
  </nav>

  <div class="sidebar__footer">
    <ui-user-menu
      [name]="currentUser().name"
      [email]="currentUser().email"
      (menuToggle)="logout.emit()"
    />
  </div>
</aside>
