<div class="app-shell">
  <!-- Sidebar -->
  <app-sidebar
    [navItems]="navItems()"
    [environments]="environments()"
    [currentUser]="currentUser()"
    (logout)="onLogout()"
  />

  <!-- Main Content Area -->
  <div class="main-wrapper">
    <!-- Header -->
    <app-header [breadcrumbs]="breadcrumbs()" (menuToggle)="toggleSidebar()" />

    <!-- Main Content -->
    <main class="main-content">
      <router-outlet />
    </main>
  </div>
</div>

<ui-toast />
