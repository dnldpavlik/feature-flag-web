# GitLab CI/CD Configuration
# SAST customization: https://docs.gitlab.com/ee/user/application_security/sast/#customizing-the-sast-settings
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings

stages:
  - install
  - lint
  - test
  - build
  - security       # Snyk scheduled scans
  - deploy         # Placeholder for future deployment
  - e2e            # E2E tests run against deployed environment

variables:
  NODE_VERSION: "22"
  # E2E Configuration - Set these in GitLab CI/CD Variables when deployment is ready
  # E2E_BASE_URL: "https://staging.example.com"
  # E2E_API_URL: "https://api.staging.example.com"

default:
  image: node:${NODE_VERSION}-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull

# =============================================================================
# Install Stage
# =============================================================================
install:
  stage: install
  script:
    - echo "//gitlab.donpavlik.com/api/v4/projects/7/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm ci
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push

# =============================================================================
# Lint Stage
# =============================================================================
lint:typescript:
  stage: lint
  needs: [install]
  script:
    - npm run lint:ts

lint:scss:
  stage: lint
  needs: [install]
  script:
    - npm run lint:scss

# =============================================================================
# Test Stage (Unit Tests)
# =============================================================================
test:unit:
  stage: test
  needs: [install]
  script:
    - npm run test:coverage
  coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/
  artifacts:
    when: always
    paths:
      - coverage/
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

sast:
  stage: test

# =============================================================================
# Build Stage
# =============================================================================
build:
  stage: build
  needs: [install]
  script:
    - npm run build:prod
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# -----------------------------------------------------------------------------
# Docker Image Build (Kaniko)
# -----------------------------------------------------------------------------
# Builds the production Docker image using pre-built artifacts from the build job
# Uses Kaniko for building without Docker daemon (more reliable in GitLab CI)
build:docker:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  needs:
    - job: build
      artifacts: true
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/docker/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
      --destination "$CI_REGISTRY_IMAGE:latest"
      --insecure
      --skip-tls-verify
      --skip-tls-verify-pull
  rules:
    - if: ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master") && $CI_REGISTRY_IMAGE

# =============================================================================
# Security Stage - Snyk Scanning (Weekly Scheduled)
# =============================================================================
# Setup Required:
# 1. Add SNYK_TOKEN as a CI/CD variable (masked, protected)
# 2. Create a pipeline schedule in GitLab:
#    - Build → Pipeline schedules → New schedule
#    - Cron: 0 6 * * 1 (Mondays at 6 AM)
#    - Variable: SCHEDULED_SECURITY_SCAN = true
# =============================================================================

# -----------------------------------------------------------------------------
# Snyk Open Source (SCA) - Dependency Vulnerabilities
# -----------------------------------------------------------------------------
snyk:dependencies:
  stage: security
  image: node:22-alpine
  needs: []
  before_script:
    - npm install -g snyk
    - snyk auth ${SNYK_TOKEN}
  script:
    - echo "=== Snyk Dependency Scan ==="
    - snyk test --severity-threshold=medium --json-file-output=snyk-dependency-results.json || true
    - snyk monitor --project-name="feature-flags-web" || true
    - snyk test --severity-threshold=medium || true
  artifacts:
    when: always
    paths:
      - snyk-dependency-results.json
    expire_in: 30 days
  rules:
    - if: $SCHEDULED_SECURITY_SCAN == "true"

# -----------------------------------------------------------------------------
# Snyk Code (SAST) - Static Application Security Testing
# -----------------------------------------------------------------------------
snyk:code:
  stage: security
  image: node:22-alpine
  needs: []
  before_script:
    - npm install -g snyk
    - snyk auth ${SNYK_TOKEN}
  script:
    - echo "=== Snyk Code (SAST) Scan ==="
    - snyk code test --severity-threshold=high --json-file-output=snyk-code-results.json || true
    - "[ -f snyk-code-results.json ] || echo '{}' > snyk-code-results.json"
  artifacts:
    when: always
    paths:
      - snyk-code-results.json
    expire_in: 30 days
  rules:
    - if: $SCHEDULED_SECURITY_SCAN == "true"

# -----------------------------------------------------------------------------
# Snyk IaC - Infrastructure as Code Scanning (Dockerfile, etc.)
# -----------------------------------------------------------------------------
snyk:iac:
  stage: security
  image: node:22-alpine
  needs: []
  before_script:
    - npm install -g snyk
    - snyk auth ${SNYK_TOKEN}
  script:
    - echo "=== Snyk IaC Scan ==="
    - snyk iac test docker/Dockerfile docker/docker-compose.yml --severity-threshold=medium --json-file-output=snyk-iac-results.json || true
    - snyk iac test docker/Dockerfile docker/docker-compose.yml --severity-threshold=medium || true
    - "[ -f snyk-iac-results.json ] || echo '{}' > snyk-iac-results.json"
  artifacts:
    when: always
    paths:
      - snyk-iac-results.json
    expire_in: 30 days
  rules:
    - if: $SCHEDULED_SECURITY_SCAN == "true"

# -----------------------------------------------------------------------------
# Security Report Summary
# -----------------------------------------------------------------------------
snyk:summary:
  stage: security
  image: alpine:latest
  needs:
    - job: snyk:dependencies
      optional: true
    - job: snyk:code
      optional: true
    - job: snyk:iac
      optional: true
  before_script:
    - apk add --no-cache jq
  script:
    - echo "=========================================="
    - echo "     Security Scan Summary"
    - echo "=========================================="
    - echo "Scan completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
    - |
      for file in snyk-*-results.json; do
        if [ -f "$file" ]; then
          scan_type=$(echo "$file" | sed 's/snyk-\(.*\)-results.json/\1/')
          echo "--- $scan_type scan ---"
          if jq -e '.vulnerabilities' "$file" > /dev/null 2>&1; then
            total=$(jq '.vulnerabilities | length' "$file" 2>/dev/null || echo "0")
            critical=$(jq '[.vulnerabilities[]? | select(.severity == "critical")] | length' "$file" 2>/dev/null || echo "0")
            high=$(jq '[.vulnerabilities[]? | select(.severity == "high")] | length' "$file" 2>/dev/null || echo "0")
            echo "  Total: $total | Critical: $critical | High: $high"
          else
            echo "  No vulnerabilities format or scan skipped"
          fi
        fi
      done
    - echo "=========================================="
  artifacts:
    when: always
    paths:
      - snyk-*-results.json
    expire_in: 30 days
  rules:
    - if: $SCHEDULED_SECURITY_SCAN == "true"

