# =============================================================================
# E2E Test Stage
# =============================================================================
# These jobs are configured but will not run until:
# 1. E2E_BASE_URL variable is set in GitLab CI/CD settings
# 2. A deployment stage is enabled above
#
# To enable: Set E2E_BASE_URL in GitLab > Settings > CI/CD > Variables

.e2e_base:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.58.0-jammy
  variables:
    E2E_ENV: "staging"
  before_script:
    - echo "//gitlab.donpavlik.com/api/v4/projects/7/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm ci
    - npx playwright install --with-deps chromium
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: test-results/junit.xml
    expire_in: 1 week
  rules:
    # Only run when E2E_BASE_URL is configured (indicates deployment is ready)
    - if: $E2E_BASE_URL
      when: on_success
    # Allow manual trigger even without E2E_BASE_URL for testing against local
    - when: manual
      allow_failure: true

e2e:smoke:
  extends: .e2e_base
  needs:
    - job: build
      optional: true
    # Uncomment when deploy stage is enabled:
    # - job: deploy:staging
    #   optional: true
  script:
    - npm run e2e:smoke -- --reporter=junit,html
  # Smoke tests are fast - run on every commit when deployment is available
  rules:
    - if: $E2E_BASE_URL
      when: on_success
    - when: manual
      allow_failure: true

e2e:journeys:
  extends: .e2e_base
  needs:
    - job: e2e:smoke
      optional: true
  script:
    - npm run e2e:journeys -- --reporter=junit,html
  rules:
    # Run after smoke tests pass, or manually
    - if: $E2E_BASE_URL
      when: on_success
    - when: manual
      allow_failure: true

e2e:regression:
  extends: .e2e_base
  needs:
    - job: e2e:journeys
      optional: true
  script:
    - npm run e2e:regression -- --reporter=junit,html
  rules:
    # Only run regression on main/develop branches, or manually
    - if: $E2E_BASE_URL && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop")
      when: on_success
    - when: manual
      allow_failure: true
  # Regression tests can be slow
  timeout: 30m

e2e:cross-browser:
  extends: .e2e_base
  needs:
    - job: e2e:smoke
      optional: true
  before_script:
    - echo "//gitlab.donpavlik.com/api/v4/projects/7/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm ci
    - npx playwright install --with-deps  # Install all browsers
  script:
    - npm run e2e:all-browsers -- --reporter=junit,html
  rules:
    # Cross-browser only on main branch or manually
    - if: $E2E_BASE_URL && $CI_COMMIT_BRANCH == "main"
      when: on_success
    - when: manual
      allow_failure: true
  timeout: 45m

# =============================================================================
# Security Scanning (GitLab Built-in)
# =============================================================================
include:
  - template: Security/SAST.gitlab-ci.yml
