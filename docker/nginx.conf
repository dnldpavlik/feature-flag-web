# =============================================================================
# Production Nginx Configuration - Feature Flag UI
# Security-hardened configuration for serving Angular SPA
# =============================================================================

# Hide nginx version in error pages and headers
server_tokens off;

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Character encoding
    charset utf-8;

    # =========================================================================
    # Security Headers
    # =========================================================================

    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS filter (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser features/APIs
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Content Security Policy - adjust as needed for your app
    # Note: 'unsafe-inline' for styles is needed for Angular's component styles
    # TODO: Update connect-src when Rust API is available (e.g., connect-src 'self' https://api.example.com)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; form-action 'self'; base-uri 'self';" always;

    # =========================================================================
    # Connection & Buffer Limits (DoS protection)
    # =========================================================================

    # Limit client body size (no file uploads expected)
    client_max_body_size 1k;

    # Buffer size limits to prevent buffer overflow attacks
    client_body_buffer_size 1k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;

    # Timeouts
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # =========================================================================
    # Gzip Compression
    # =========================================================================

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # =========================================================================
    # Caching
    # =========================================================================

    # Cache static assets aggressively (Angular uses content hashing)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Re-add security headers (add_header in location blocks replaces parent)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Don't cache HTML (SPA entry point)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";

        # Re-add security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        # TODO: Update connect-src when Rust API is available (e.g., connect-src 'self' https://api.example.com)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; form-action 'self'; base-uri 'self';" always;
    }

    # =========================================================================
    # Angular SPA Routing
    # =========================================================================

    location / {
        try_files $uri $uri/ /index.html;
    }

    # =========================================================================
    # Health Check Endpoint
    # =========================================================================

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # =========================================================================
    # Security: Block Sensitive Paths
    # =========================================================================

    # Block access to hidden files (except .well-known for ACME)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to backup files
    location ~* \.(bak|conf|dist|fla|in[ci]|log|orig|psd|sh|sql|sw[op])$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block source map files in production (optional - remove if you need them)
    location ~* \.map$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
